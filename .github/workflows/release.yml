  windows-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          auto-update-conda: true

      - name: Install conda-lock
        run: conda install -n base -c conda-forge conda-lock

      - name: Create build environment
        run: conda-lock install --prefix ./env

      - name: Install local package
        shell: pwsh
        run: conda run --prefix ./env pip install -e .

      - name: Fetch sosi bundle (windows)
        shell: pwsh
        run: .\scripts\fetch_gdal_bundle_win.ps1

      - name: Build binary
        shell: pwsh
        run: conda run --prefix ./env pyinstaller server.spec

      - name: Package artifact
        run: Compress-Archive -Path dist/server -DestinationPath skavl-anomaly-${env:GITHUB_REF_NAME}-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skavl-anomaly-windows
          path: skavl-anomaly-${{ github.ref_name }}-windows.zip

  publish-release:
    runs-on: ubuntu-latest
    needs:
#      - linux-build
      - windows-build
    permissions:
      contents: write

    steps:
#      - name: Download Linux artifact
#        uses: actions/download-artifact@v4
#        with:
#          name: skavl-anomaly-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: skavl-anomaly-windows

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: skavl-anomaly-${{ github.ref_name }}-windows.zip
